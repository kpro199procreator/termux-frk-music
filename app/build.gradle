def validateVersionName(String versionName) {
    // https://semver.org/spec/v2.0.0.html#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string
    // ^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$
    if (!java.util.regex.Pattern.matches("^(0|[1-9]\\d*)\\.(0|[1-9]\\d*)\\.(0|[1-9]\\d*)(?:-((?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\\.(?:0|[1-9]\\d*|\\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\\+([0-9a-zA-Z-]+(?:\\.[0-9a-zA-Z-]+)*))?\$", versionName))
        throw new GradleException("The versionName '"  + versionName + "' is not a valid version as per semantic version '2.0.0' spec in the format 'major.minor.patch(-prerelease)(+buildmetadata)'. https://semver.org/spec/v2.0.0.html.")
}

def downloadBootstrap(String arch, String expectedChecksum) {
    def digest = java.security.MessageDigest.getInstance("SHA-256")
    def localPath = "src/main/cpp/bootstrap-" + arch + ".zip"
    def file = new File(projectDir, localPath)

    // 1. Verificar si el archivo local ya existe y es correcto
    if (file.exists()) {
        def buffer = new byte[8192]
        file.withInputStream { input ->
            def readBytes
            while ((readBytes = input.read(buffer)) != -1) {
                digest.update(buffer, 0, readBytes)
            }
        }
        def checksum = new BigInteger(1, digest.digest()).toString(16).padLeft(64, '0')
        if (checksum == expectedChecksum) {
            logger.quiet("Bootstrap para ${arch} ya está actualizado.")
            return
        } else {
            logger.quiet("Hash incorrecto en ${localPath}. Re-descargando...")
            file.delete()
        }
    }

    // 2. Configurar la URL directa (Sin carpetas de versión)
    // Nota: El archivo en tu repo debe llamarse exactamente bootstrap-aarch64.zip
    def remoteUrl = "https://github.com/kpro199procreator/te-packages-for-all-apps/releases/latest/download/bootstrap-" + arch + ".zip"
    
    logger.quiet("Descargando desde: ${remoteUrl}")

    file.parentFile.mkdirs()
    
    // 3. Descarga con reintentos y timeouts para archivos grandes (>25MB)
    try {
        def connection = new URL(remoteUrl).openConnection()
        connection.setConnectTimeout(15000) // 15 segundos para conectar
        connection.setReadTimeout(90000)    // 90 segundos para descargar (ajustado para >25MB)
        connection.setInstanceFollowRedirects(true)

        digest.reset() // Reiniciar el digest para la nueva descarga
        def out = new BufferedOutputStream(new FileOutputStream(file))
        def digestStream = new java.security.DigestInputStream(connection.inputStream, digest)
        
        out << digestStream
        out.close()
        digestStream.close()

        // 4. Verificar integridad después de descargar
        def checksum = new BigInteger(1, digest.digest()).toString(16).padLeft(64, '0')
        if (checksum != expectedChecksum) {
            file.delete()
            throw new GradleException("ERROR de Integridad: El SHA-256 no coincide.\nEsperado: ${expectedChecksum}\nObtenido: ${checksum}")
        }
        logger.quiet("Descarga exitosa y verificada para ${arch}.")
        
    } catch (Exception e) {
        if (file.exists()) file.delete()
        throw new GradleException("Fallo al descargar el bootstrap: ${e.message}")
    }
}

// Limpiar archivos viejos al ejecutar clean
clean {
    doLast {
        def tree = fileTree(new File(projectDir, 'src/main/cpp'))
        tree.include 'bootstrap-*.zip'
        tree.each { it.delete() }
    }
}

