plugins {
    id "com.android.application"
}

ext {
    packageVariant = System.getenv("TERMUX_PACKAGE_VARIANT") ?: "apt-android-7"
}

android {
    namespace "com.termux"

    compileSdkVersion project.properties.compileSdkVersion.toInteger()
    ndkVersion = System.getenv("JITPACK_NDK_VERSION") ?: project.properties.ndkVersion
    
    def appVersionName = System.getenv("TERMUX_APP_VERSION_NAME") ?: ""
    def apkVersionTag = System.getenv("TERMUX_APK_VERSION_TAG") ?: ""
    def splitAPKsForDebugBuilds = System.getenv("TERMUX_SPLIT_APKS_FOR_DEBUG_BUILDS") ?: "1"
    def splitAPKsForReleaseBuilds = System.getenv("TERMUX_SPLIT_APKS_FOR_RELEASE_BUILDS") ?: "0"

    defaultConfig {
        minSdkVersion project.properties.minSdkVersion.toInteger()
        targetSdkVersion project.properties.targetSdkVersion.toInteger()
        versionCode 119
        versionName "0.118.0"

        if (appVersionName) versionName = appVersionName
        
        buildConfigField "String", "TERMUX_PACKAGE_VARIANT", "\"" + project.ext.packageVariant + "\""

        manifestPlaceholders.TERMUX_PACKAGE_NAME = "com.sucu.dl"
        manifestPlaceholders.TERMUX_APP_NAME = "Terminal S"

        externalNativeBuild {
            ndkBuild {
                // Filtro para compilar solo 64 bits y evitar error de bootstrap-arm.zip
                abiFilters "arm64-v8a"
                cFlags "-std=c11", "-Wall", "-Wextra", "-Werror", "-Os", "-fno-stack-protector", "-Wl,--gc-sections"
            }
        }
    }

    splits {
        abi {
            enable ((gradle.startParameter.taskNames.any { it.contains("Debug") } && splitAPKsForDebugBuilds == "1") ||
                    (gradle.startParameter.taskNames.any { it.contains("Release") } && splitAPKsForReleaseBuilds == "1"))
            reset()
            include 'arm64-v8a'
            universalApk false
        }
    }

    externalNativeBuild {
        ndkBuild {
            path "src/main/cpp/Android.mk"
        }
    }

    // ... (El resto de signingConfigs y buildTypes se mantienen igual)
}

// Tarea para descargar el bootstrap antes de compilar
def downloadBootstrap(String arch, String expectedChecksum) {
    def digest = java.security.MessageDigest.getInstance("SHA-256")
    def localPath = "src/main/cpp/bootstrap-" + arch + ".zip"
    def file = new File(projectDir, localPath)

    if (file.exists()) {
        file.withInputStream { input ->
            def buffer = new byte[8192]
            def readBytes
            while ((readBytes = input.read(buffer)) != -1) {
                digest.update(buffer, 0, readBytes)
            }
        }
        def checksum = new BigInteger(1, digest.digest()).toString(16).padLeft(64, '0')
        if (checksum == expectedChecksum) return
        file.delete()
    }

    def remoteUrl = "https://github.com/kpro199procreator/te-packages-for-all-apps/releases/latest/download/bootstrap-" + arch + ".zip"
    file.parentFile.mkdirs()
    
    new URL(remoteUrl).openConnection().with { conn ->
        conn.connectTimeout = 15000
        conn.readTimeout = 90000
        file.withOutputStream { out -> out << conn.inputStream }
    }
}

task downloadBootstraps() {
    doLast {
        downloadBootstrap("aarch64", "78812a89ab66db914f9ff012a58f1e356a01c6789f0fc7ed1ca4b4c455ed8ae3")
    }
}

// Vincular la descarga al proceso de compilación
afterEvaluate {
    android.applicationVariants.all { variant ->
        variant.javaCompileProvider.get().dependsOn(downloadBootstraps)
